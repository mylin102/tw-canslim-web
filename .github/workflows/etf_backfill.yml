name: ETF Backfill

on:
  schedule:
    - cron: '0 2 * * 6'
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Optional comma-separated ETF tickers'
        required: false
        type: string
      limit:
        description: 'Optional limit for number of ETFs to backfill'
        required: false
        type: string

concurrency:
  group: publish-surface-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  etf-backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Restore rotation state artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ROTATION_STATE_ARTIFACT: rotation-state-${{ github.ref_name }}
        run: |
          mkdir -p .orchestration .orchestration-artifact
          RESTORED=0
          for RUN_ID in $(gh run list --branch "${{ github.ref_name }}" --json databaseId -L 20 --jq '.[] | select((.databaseId|tostring) != env.GITHUB_RUN_ID) | .databaseId'); do
            rm -rf .orchestration-artifact/*
            if gh run download "$RUN_ID" --name "$ROTATION_STATE_ARTIFACT" --dir .orchestration-artifact 2>/dev/null; then
              RESTORED_FILE=$(find .orchestration-artifact -name rotation_state.json | head -n 1)
              if [ -n "$RESTORED_FILE" ]; then
                cp "$RESTORED_FILE" .orchestration/rotation_state.json
                echo "Restored rotation state from run $RUN_ID"
                RESTORED=1
                break
              fi
            fi
          done
          if [ "$RESTORED" -eq 0 ]; then
            echo "No prior rotation state artifact found"
          fi

      - name: Run ETF backfill
        run: |
          ARGS=()
          if [ -n "${{ github.event.inputs.tickers }}" ]; then
            ARGS+=(--tickers "${{ github.event.inputs.tickers }}")
          fi
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS+=(--limit "${{ github.event.inputs.limit }}")
          fi
          python3 update_etf_backfill.py "${ARGS[@]}"

      - name: Upload rotation state artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rotation-state-${{ github.ref_name }}
          path: .orchestration/rotation_state.json
          if-no-files-found: warn

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data_base.json docs/data.json docs/data_light.json docs/data.json.gz
          git add docs/stock_index.json docs/update_summary.json
          git add .orchestration/rotation_state.json
          git commit -m "ETF backfill: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push
