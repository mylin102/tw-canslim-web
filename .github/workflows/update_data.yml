name: 增量交易系統自動更新

on:
  schedule:
    # 台灣時間 18:00 (收盤後) = UTC 10:00
    - cron: '0 10 * * 1-5' # UTC 10:00 = 台灣 18:00, 週一至週五
  workflow_dispatch: # 允許手動觸發

concurrency:
  group: publish-surface-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  incremental-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 🛠️ 檢查程式碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 取得完整歷史記錄
    
      - name: 🐍 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
    
      - name: 📦 安裝依賴
        run: |
          pip install -r requirements.txt
          pip install yfinance pandas numpy requests

      - name: ♻️ 還原 rotation state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ROTATION_STATE_ARTIFACT: rotation-state-${{ github.ref_name }}
        run: |
          mkdir -p .orchestration .orchestration-artifact
          RESTORED=0
          for RUN_ID in $(gh run list --branch "${{ github.ref_name }}" --json databaseId -L 20 --jq '.[] | select((.databaseId|tostring) != env.GITHUB_RUN_ID) | .databaseId'); do
            rm -rf .orchestration-artifact/*
            if gh run download "$RUN_ID" --name "$ROTATION_STATE_ARTIFACT" --dir .orchestration-artifact 2>/dev/null; then
              RESTORED_FILE=$(find .orchestration-artifact -name rotation_state.json | head -n 1)
              if [ -n "$RESTORED_FILE" ]; then
                cp "$RESTORED_FILE" .orchestration/rotation_state.json
                echo "Restored rotation state from run $RUN_ID"
                RESTORED=1
                break
              fi
            fi
          done
          if [ "$RESTORED" -eq 0 ]; then
            echo "No prior rotation state artifact found"
          fi
    
      - name: 🔄 執行增量更新
        run: |
          echo "開始每日發布流程..."
          echo "步驟 1: 更新 CANSLIM 資料與 Phase 4 publish bundle..."
          python export_canslim.py
          echo "✅ 每日發布完成！"

      - name: ⏱️ 驗證 runtime budget
        env:
          RUNTIME_BUDGET_NOTE: ${{ vars.RUNTIME_BUDGET_NOTE }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path(".orchestration/runtime_budget.json").read_text(encoding="utf-8"))
          required = {"elapsed_seconds", "retry_attempts", "retry_failures", "provider_wait_seconds"}
          missing = sorted(required.difference(payload))
          if missing:
              raise SystemExit(f"runtime_budget missing keys: {missing}")
          note = os.environ.get("RUNTIME_BUDGET_NOTE", "").strip()
          if payload["elapsed_seconds"] > 1200 and not note:
              raise SystemExit(
                  f"elapsed_seconds {payload['elapsed_seconds']} exceeds 1200 without RUNTIME_BUDGET_NOTE"
              )
          print(payload)
          PY
    
      - name: 📊 檢查結果
        run: |
          echo "檢查生成的檔案..."
          ls -la docs/*.json docs/*.html 2>/dev/null | head -20
          python - <<'PY'
          import json
          from pathlib import Path

          for path_str in (
              "docs/data.json",
              "docs/data_base.json",
              "docs/stock_index.json",
              "docs/update_summary.json",
          ):
              path = Path(path_str)
              payload = json.loads(path.read_text(encoding="utf-8"))
              print(f"✅ {path_str}: artifact_kind={payload.get('artifact_kind')} run_id={payload.get('run_id')}")
          PY

      - name: 📦 上傳 rotation state artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rotation-state-${{ github.ref_name }}
          path: .orchestration/rotation_state.json
          if-no-files-found: warn
    
      - name: 📤 提交更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 添加所有更新的檔案
          git add docs/data.json docs/data_base.json docs/data_light.json docs/data.json.gz
          git add docs/stock_index.json docs/update_summary.json
          git add .orchestration/rotation_state.json
          git add docs/incremental_dashboard.html docs/test_github_pages.html 2>/dev/null || true
          
          # 提交
          git commit -m "📈 自動更新: CANSLIM資料發布 $(date +'%Y-%m-%d %H:%M')" || echo "沒有變更可提交"
          
          # 推送
          git push
