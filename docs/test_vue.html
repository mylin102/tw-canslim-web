<!DOCTYPE html>
<html>
<head>
    <title>Vue v-model Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.prod.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>[v-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-50 p-8">
    <div id="app" v-cloak class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-xl font-bold mb-4 border-b pb-2">Vue Reactivity Test</h1>
        
        <!-- Tab Test -->
        <div class="mb-6">
            <h2 class="text-sm font-semibold text-gray-500 uppercase mb-2">1. Tab Switch (@click)</h2>
            <div class="flex space-x-2 mb-2">
                <button v-for="tab in ['search', 'ranking', 'screener']" 
                        :key="tab"
                        @click="activeTab = tab"
                        :class="['px-3 py-1 rounded text-sm transition', activeTab === tab ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200']">
                    {{ tab.charAt(0).toUpperCase() + tab.slice(1) }}
                </button>
            </div>
            <p class="text-xs text-gray-400">Current Tab: <span class="font-mono font-bold text-blue-600">{{ activeTab }}</span></p>
        </div>

        <!-- v-model Test -->
        <div class="mb-6">
            <h2 class="text-sm font-semibold text-gray-500 uppercase mb-2">2. Input Test (v-model)</h2>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Text Input</label>
                    <input v-model="inputText" 
                           placeholder="Type something..." 
                           class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="p-3 bg-blue-50 rounded-lg border border-blue-100">
                    <p class="text-sm text-gray-600">Reactive Output:</p>
                    <p class="text-lg font-bold text-blue-800 break-all">{{ inputText || '(Empty)' }}</p>
                </div>
            </div>
        </div>

        <!-- Checkbox Test -->
        <div class="mb-6">
            <h2 class="text-sm font-semibold text-gray-500 uppercase mb-2">3. Boolean Test (v-model)</h2>
            <label class="flex items-center space-x-2 cursor-pointer">
                <input type="checkbox" v-model="isChecked" class="w-4 h-4 text-blue-600 rounded">
                <span class="text-sm text-gray-700">Toggle this status</span>
            </label>
            <div class="mt-2">
                <span :class="['px-2 py-0.5 rounded-full text-xs font-bold', isChecked ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700']">
                    {{ isChecked ? 'ENABLED' : 'DISABLED' }}
                </span>
            </div>
        </div>

        <button @click="resetForm" class="w-full py-2 bg-gray-800 text-white rounded-lg hover:bg-gray-700 transition font-medium">
            Reset All
        </button>
    </div>

    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const activeTab = ref('search');
                const inputText = ref('');
                const isChecked = ref(false);

                const resetForm = () => {
                    activeTab.ref = 'search';
                    inputText.value = '';
                    isChecked.value = false;
                };

                return { 
                    activeTab, 
                    inputText, 
                    isChecked,
                    resetForm
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
