<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.prod.min.js"></script>
    <style>[v-cloak] { display: none !important; }</style>
</head>
<body>
    <div id="app" v-cloak>
        <p>activeTab = {{ activeTab }}</p>
        <button @click="activeTab = 'search'">Search</button>
        <button @click="activeTab = 'ranking'">Ranking</button>
        <button @click="activeTab = 'screener'">Screener</button>

        <div v-if="activeTab === 'search'"><p>SEARCH TAB CONTENT</p></div>
        <div v-if="activeTab === 'ranking'"><p>RANKING TAB CONTENT</p></div>
        <div v-if="activeTab === 'screener'"><p>SCREENER TAB CONTENT</p></div>
    </div>
    <script>
        Vue.createApp({
            setup() {
                const activeTab = Vue.ref('search');
                return { activeTab };
            }
        }).mount('#app');
    </script>
</body>
</html>
